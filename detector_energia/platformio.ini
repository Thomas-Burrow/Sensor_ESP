; ============================================================
;  PlatformIO - Detector de Queda de Energia | ESP32-C6
;  UFSM - Projeto Integrador II
; ============================================================

[env:esp32-c6-devkitc-1]

; --- Platform ---
; A "espressif32" padrão do PlatformIO ainda nao tem suporte
; completo ao ESP32-C6 com Arduino. Por isso usamos o fork
; "pioarduino", mantido pela comunidade, que adiciona esse suporte.
; A tag "stable" sempre aponta pra ultima versao estavel
; (nao precisa trocar o link toda hora).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip

board = esp32-c6-devkitc-1
framework = arduino

; Velocidade do monitor serial
monitor_speed = 115200

; Particionamento com espaço para OTA
board_build.partitions = default_8MB.csv

; --- Dependências ---
; PZEM004Tv30: nome correto no registro é "mandulaj/PZEM-004T-v30"
; (o nome "olehs/PZEM004Tv30" usado antes não existe e quebrava o build)
lib_deps =
    knolleary/PubSubClient @ ^2.8
    ayushsharma82/ElegantOTA @ ^3.1.6
    mandulaj/PZEM-004T-v30

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
